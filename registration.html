<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Assisting Bot — Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#4ade80;--gold:#fbbf24;--white:#f0fdf4;
  --muted:#86efac;--border:rgba(74,222,128,0.15);
  --card:rgba(0,0,0,0.45);
}
body{font-family:'DM Sans',sans-serif;background:#0d1f0f;color:var(--white);min-height:100vh;overflow-x:hidden;position:relative;}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

.page{position:relative;z-index:10;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 20px;}
.card{width:100%;max-width:520px;background:var(--card);border:1px solid var(--border);border-radius:28px;padding:44px 40px;backdrop-filter:blur(24px);box-shadow:0 0 80px rgba(74,222,128,0.08),0 30px 80px rgba(0,0,0,0.6);animation:card-rise 0.8s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes card-rise{from{opacity:0;transform:translateY(50px)scale(0.95);}to{opacity:1;transform:none;}}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.brand-icon{width:48px;height:48px;background:linear-gradient(135deg,#4ade80,#16a34a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 20px rgba(74,222,128,0.4);animation:icon-pulse 3s ease-in-out infinite;}
@keyframes icon-pulse{0%,100%{box-shadow:0 6px 20px rgba(74,222,128,0.4);}50%{box-shadow:0 6px 35px rgba(74,222,128,0.7);}}
.brand-text h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;line-height:1.2;}
.brand-text h1 span{color:var(--green);}
.brand-text p{font-size:12px;color:var(--muted);margin-top:2px;}
.progress-bar{display:flex;align-items:center;margin-bottom:32px;}
.pdot{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);transition:all 0.4s cubic-bezier(0.16,1,0.3,1);flex-shrink:0;}
.pdot.active{background:var(--green);border-color:var(--green);color:#000;box-shadow:0 0 25px rgba(74,222,128,0.6);transform:scale(1.1);}
.pdot.done{background:rgba(74,222,128,0.2);border-color:var(--green);color:var(--green);}
.pline{flex:1;height:2px;background:var(--border);transition:background 0.5s ease;}
.pline.done{background:var(--green);}
.step-label{font-size:12px;color:var(--muted);margin-bottom:20px;font-weight:500;letter-spacing:0.04em;}
.step{display:none;}
.step.active{display:block;animation:step-slide 0.4s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes step-slide{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:none;}}
.field{margin-bottom:16px;position:relative;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:7px;}
.field input,.field select{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:13px 15px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;transition:all 0.2s;outline:none;-webkit-appearance:none;}
.field input::placeholder{color:rgba(134,239,172,0.3);}
.field input:focus,.field select:focus{border-color:var(--green);background:rgba(74,222,128,0.06);box-shadow:0 0 0 3px rgba(74,222,128,0.12);}
.field select option{background:#0d2010;color:var(--white);}
.state-wrap{position:relative;}
.state-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#0d2010;border:1px solid var(--border);border-radius:10px;max-height:200px;overflow-y:auto;z-index:100;display:none;animation:dd-in 0.2s ease;box-shadow:0 15px 40px rgba(0,0,0,0.5);}
.state-dropdown.open{display:block;}
@keyframes dd-in{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}
.state-dropdown::-webkit-scrollbar{width:4px;}
.state-dropdown::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.state-option{padding:10px 15px;font-size:13px;cursor:pointer;transition:background 0.15s;color:var(--white);}
.state-option:hover,.state-option.highlight{background:rgba(74,222,128,0.12);color:var(--green);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.toggle-group{display:flex;gap:8px;}
.tog{flex:1;padding:10px 8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;}
.tog.on{background:rgba(74,222,128,0.15);border-color:var(--green);color:var(--green);}
.btn-row{display:flex;gap:10px;margin-top:26px;}
.btn-back{padding:13px 20px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-back:hover{border-color:var(--muted);color:var(--white);}
.btn-next{flex:1;padding:14px;background:linear-gradient(135deg,#4ade80,#16a34a);border:none;border-radius:10px;color:#000;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(74,222,128,0.45);}
.success-screen{display:none;position:absolute;inset:0;border-radius:28px;background:rgba(13,31,15,0.96);flex-direction:column;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(10px);}
.success-screen.show{display:flex;animation:fade-in 0.4s ease;}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.s-icon{font-size:56px;animation:pop 0.6s cubic-bezier(0.16,1,0.3,1) both;margin-bottom:20px;}
@keyframes pop{from{transform:scale(0)rotate(-20deg);}to{transform:scale(1)rotate(0);}}
.s-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--green);margin-bottom:8px;}
.s-sub{color:var(--muted);font-size:14px;}

/* Photo upload custom style */
.photo-upload-area{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.02);}
.photo-upload-area:hover{border-color:var(--green);background:rgba(74,222,128,0.04);}
.photo-upload-area input{display:none;}
.photo-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--green);display:none;margin:0 auto 10px;}
.photo-upload-icon{font-size:32px;margin-bottom:8px;}
.photo-upload-text{font-size:13px;color:var(--muted);}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="page">
<div class="card" style="position:relative">
  <div class="success-screen" id="successScreen">
    <div class="s-icon">🌾</div>
    <div class="s-title">Registered!</div>
    <div class="s-sub">Opening Farmer Assisting Bot…</div>
  </div>

  <div class="brand">
    <div class="brand-icon">🌿</div>
    <div class="brand-text">
      <h1>Farmer <span>Assisting Bot</span></h1>
      <p>Smart Farming Assistant</p>
    </div>
  </div>

  <div class="progress-bar">
    <div class="pdot active" id="d1">1</div><div class="pline" id="l1"></div>
    <div class="pdot" id="d2">2</div><div class="pline" id="l2"></div>
    <div class="pdot" id="d3">3</div><div class="pline" id="l3"></div>
    <div class="pdot" id="d4">4</div>
  </div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <div class="step-label">👤 STEP 1 — Personal Details</div>
    <div class="field"><label>Full Name</label><input id="f_name" type="text" placeholder="e.g. Ravi Kumar" onkeydown="enterNext(event,'f_phone')"></div>
    <div class="row">
      <div class="field"><label>Phone Number</label><input id="f_phone" type="tel" placeholder="9876543210" onkeydown="enterNext(event,'f_village')"></div>
      <div class="field"><label>Age</label><input id="f_age" type="number" placeholder="35"></div>
    </div>
    <div class="field"><label>Village / Town</label><input id="f_village" type="text" placeholder="e.g. Thanjavur" onkeydown="enterNext(event,'f_state_input')"></div>
    <div class="field state-wrap">
      <label>State</label>
      <input id="f_state_input" type="text" placeholder="Click to select state…" readonly onclick="toggleStateDD()" onkeydown="stateKeyNav(event)" style="cursor:pointer">
      <input type="hidden" id="f_state">
      <div class="state-dropdown" id="stateDD"></div>
    </div>
    <div class="btn-row"><button class="btn-next" onclick="goStep(2)">Next →</button></div>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <div class="step-label">🌾 STEP 2 — Farm Details</div>
    <div class="row">
      <div class="field"><label>Land (Acres)</label><input id="f_acres" type="number" placeholder="5"></div>
      <div class="field"><label>Land Type</label><select id="f_landtype"><option value="Owned">Owned</option><option value="Leased">Leased</option><option value="Shared">Shared</option><option value="Government">Government</option></select></div>
    </div>
    <div class="field"><label>Primary Crop</label><input id="f_crop" type="text" placeholder="e.g. Rice, Wheat, Cotton"></div>
    <div class="field"><label>Soil Type</label><select id="f_soil"><option value="Black">Black Soil</option><option value="Red">Red Soil</option><option value="Alluvial">Alluvial Soil</option><option value="Sandy">Sandy Soil</option><option value="Loamy">Loamy Soil</option><option value="Clay">Clay Soil</option><option value="Laterite">Laterite</option></select></div>
    <div class="field"><label>Irrigation Source</label><select id="f_irrigation"><option value="Canal">Canal</option><option value="Borewell">Borewell</option><option value="Rainwater">Rainwater Only</option><option value="Drip">Drip Irrigation</option><option value="River">River</option><option value="Tank">Tank / Pond</option></select></div>
    <div class="btn-row"><button class="btn-back" onclick="goStep(1)">← Back</button><button class="btn-next" onclick="goStep(3)">Next →</button></div>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <div class="step-label">🏛️ STEP 3 — Government Schemes</div>
    <div class="field"><label>Kisan Credit Card (KCC)</label><div class="toggle-group"><button class="tog on" id="kcc_y" onclick="tog('kcc','Yes')">✅ Yes, I have KCC</button><button class="tog" id="kcc_n" onclick="tog('kcc','No')">❌ Not yet</button></div></div>
    <div class="field"><label>PM-KISAN Enrolled</label><div class="toggle-group"><button class="tog on" id="pmk_y" onclick="tog('pmk','Yes')">✅ Enrolled</button><button class="tog" id="pmk_n" onclick="tog('pmk','No')">❌ Not enrolled</button></div></div>
    <div class="field"><label>PMFBY (Crop Insurance)</label><div class="toggle-group"><button class="tog on" id="pmfby_y" onclick="tog('pmfby','Yes')">✅ Have Insurance</button><button class="tog" id="pmfby_n" onclick="tog('pmfby','No')">❌ No Insurance</button></div></div>
    <div class="field"><label>Annual Income (₹)</label><select id="f_income"><option value="below1">Below ₹1 Lakh</option><option value="1to3">₹1 – ₹3 Lakh</option><option value="3to6">₹3 – ₹6 Lakh</option><option value="above6">Above ₹6 Lakh</option></select></div>
    <div class="btn-row"><button class="btn-back" onclick="goStep(2)">← Back</button><button class="btn-next" onclick="goStep(4)">Next →</button></div>
  </div>

  <!-- STEP 4 -->
  <div class="step" id="step4">
    <div class="step-label">🗣️ STEP 4 — Communication Preferences</div>
    <div class="field"><label>Preferred Language for AI Voice</label><select id="f_lang"><option value="en-IN">English (India)</option><option value="hi-IN">Hindi — हिन्दी</option><option value="ta-IN">Tamil — தமிழ்</option><option value="te-IN">Telugu — తెలుగు</option><option value="kn-IN">Kannada — ಕನ್ನಡ</option><option value="ml-IN">Malayalam — മലയാളം</option><option value="mr-IN">Marathi — मराठी</option><option value="gu-IN">Gujarati — ગુજરાતી</option><option value="pa-IN">Punjabi — ਪੰਜਾਬੀ</option><option value="bn-IN">Bengali — বাংলা</option><option value="or-IN">Odia — ଓଡ଼ିଆ</option></select></div>
    <div class="field"><label>Farm Location (for weather)</label><input id="f_location" type="text" placeholder="e.g. Coimbatore, Thanjavur…"></div>
    <div class="field">
      <label>Profile Photo (optional)</label>
      <div class="photo-upload-area" onclick="document.getElementById('f_photo').click()">
        <img id="photoPreview" class="photo-preview" src="" alt="Preview">
        <div class="photo-upload-icon" id="photoIcon">📷</div>
        <div class="photo-upload-text" id="photoText">Click to upload profile photo</div>
        <input id="f_photo" type="file" accept="image/*" onchange="previewPhoto(event)">
      </div>
    </div>
    <div class="btn-row"><button class="btn-back" onclick="goStep(3)">← Back</button><button class="btn-next" onclick="submitReg()">🌾 Launch Farmer Assisting Bot</button></div>
  </div>
</div>
</div>

<script>
const STATES=["Andhra Pradesh","Arunachal Pradesh","Assam","Bihar","Chhattisgarh","Goa","Gujarat","Haryana","Himachal Pradesh","Jharkhand","Karnataka","Kerala","Madhya Pradesh","Maharashtra","Manipur","Meghalaya","Mizoram","Nagaland","Odisha","Punjab","Rajasthan","Sikkim","Tamil Nadu","Telangana","Tripura","Uttar Pradesh","Uttarakhand","West Bengal","Delhi","Jammu & Kashmir","Ladakh","Puducherry","Chandigarh","Andaman & Nicobar","Lakshadweep"];
let hiIdx=-1;
function buildStateDD(f=''){const dd=document.getElementById('stateDD');const list=STATES.filter(s=>s.toLowerCase().includes(f.toLowerCase()));dd.innerHTML=list.map(s=>`<div class="state-option" data-val="${s}" onclick="selectState('${s}')">${s}</div>`).join('');hiIdx=-1;}
function toggleStateDD(){const dd=document.getElementById('stateDD');buildStateDD(document.getElementById('f_state_input').value);dd.classList.toggle('open');}
function selectState(v){document.getElementById('f_state_input').value=v;document.getElementById('f_state').value=v;document.getElementById('stateDD').classList.remove('open');}
function stateKeyNav(e){
  const dd=document.getElementById('stateDD'),opts=dd.querySelectorAll('.state-option');
  if(!dd.classList.contains('open')){dd.classList.add('open');buildStateDD();return;}
  if(e.key==='ArrowDown'){e.preventDefault();hiIdx=Math.min(hiIdx+1,opts.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();hiIdx=Math.max(hiIdx-1,0);}
  else if(e.key==='Enter'&&hiIdx>=0){e.preventDefault();selectState(opts[hiIdx].dataset.val);return;}
  else if(e.key==='Escape'){dd.classList.remove('open');return;}
  opts.forEach((o,i)=>o.classList.toggle('highlight',i===hiIdx));
  if(hiIdx>=0)opts[hiIdx].scrollIntoView({block:'nearest'});
}
document.addEventListener('click',e=>{if(!e.target.closest('.state-wrap'))document.getElementById('stateDD').classList.remove('open');});
function enterNext(e,id){if(e.key==='Enter'){e.preventDefault();document.getElementById(id)?.focus();}}
const togState={kcc:'Yes',pmk:'Yes',pmfby:'Yes'};
function tog(name,val){togState[name]=val;document.getElementById(name+'_y').classList.toggle('on',val==='Yes');document.getElementById(name+'_n').classList.toggle('on',val==='No');}
function goStep(n){
  for(let i=1;i<=4;i++){
    document.getElementById('step'+i).classList.toggle('active',i===n);
    const dot=document.getElementById('d'+i);
    if(i<n){dot.className='pdot done';dot.innerHTML='✓';}
    else if(i===n){dot.className='pdot active';dot.innerHTML=i;}
    else{dot.className='pdot';dot.innerHTML=i;}
    if(i<4)document.getElementById('l'+i).classList.toggle('done',i<n);
  }
}

function previewPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const prev=document.getElementById('photoPreview');
    prev.src=ev.target.result;prev.style.display='block';
    document.getElementById('photoIcon').style.display='none';
    document.getElementById('photoText').textContent='Photo selected ✓';
    localStorage.setItem('farmerPhoto',ev.target.result);
  };
  rd.readAsDataURL(file);
}

function submitReg(){
  const data={
    name:document.getElementById('f_name').value||'Farmer',
    phone:document.getElementById('f_phone').value,
    age:document.getElementById('f_age').value,
    village:document.getElementById('f_village').value,
    state:document.getElementById('f_state').value||document.getElementById('f_state_input').value,
    acres:document.getElementById('f_acres').value,
    landtype:document.getElementById('f_landtype').value,
    crop:document.getElementById('f_crop').value,
    soil:document.getElementById('f_soil').value,
    irrigation:document.getElementById('f_irrigation').value,
    kcc:togState.kcc,pmkisan:togState.pmk,pmfby:togState.pmfby,
    income:document.getElementById('f_income').value,
    lang:document.getElementById('f_lang').value,
    location:document.getElementById('f_location').value
  };
  localStorage.setItem('farmerProfile',JSON.stringify(data));
  document.getElementById('successScreen').classList.add('show');
  setTimeout(()=>window.location.href='index.html',2000);
}

/* ══════════════ LUSH NIGHT BACKGROUND ══════════════ */
const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
let W,H,blades=[],fireflies=[],clouds=[],birds=[],tick=0;
function rnd(a,b){return a+Math.random()*(b-a);}
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;initScene();}
function initScene(){
  const groundY=H*0.79;
  blades=[];
  const count=Math.floor(W/3);
  for(let i=0;i<count;i++){
    const layer=Math.floor(rnd(0,3));
    const tall=[0.5,0.75,1][layer];
    blades.push({x:rnd(0,W),y:groundY+rnd(0,H*0.055),h:rnd(28,155)*tall,bw:rnd(2,4.5)*(0.5+tall*0.5),hue:rnd(100,138),sat:rnd(38,70),lit:rnd(10,38)*(0.5+tall*0.6),phase:rnd(0,Math.PI*2),spd:rnd(0.25,0.9),sway:rnd(3,22)*tall,segs:7,layer});
  }
  blades.sort((a,b)=>a.layer-b.layer);
  fireflies=Array.from({length:28},(_,i)=>({x:rnd(0,W),y:rnd(H*0.28,H*0.78),vx:rnd(-0.25,0.25),vy:rnd(-0.35,-0.05),life:rnd(0,200),maxLife:rnd(100,280),size:rnd(1.5,3.8),hue:rnd(88,155),phase:i*0.65}));
  clouds=Array.from({length:5},()=>({x:rnd(0,W),y:rnd(H*0.04,H*0.22),w:rnd(100,260),h:rnd(28,55),spd:rnd(0.06,0.2),alpha:rnd(0.03,0.1)}));
  birds=Array.from({length:4},()=>({x:rnd(0,W),y:rnd(H*0.06,H*0.28),spd:rnd(0.35,0.85),size:rnd(5,10),fp:rnd(0,Math.PI*2)}));
}
function frame(){
  tick+=0.4;
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#010804');sky.addColorStop(0.3,'#040f06');sky.addColorStop(0.65,'#091e0c');sky.addColorStop(1,'#0d2b10');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  for(let s=0;s<90;s++){const sx=((s*137.508+41)%W),sy=((s*83.1+29)%(H*0.54)),tw=0.25+0.75*Math.abs(Math.sin(tick*0.018+s*0.71));ctx.beginPath();ctx.arc(sx,sy,s%4===0?1.3:0.65,0,Math.PI*2);ctx.fillStyle=`rgba(240,240,210,${tw*0.7})`;ctx.fill();}
  const mx=W*0.83,my=H*0.09;
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,100);mg.addColorStop(0,'rgba(254,243,148,0.20)');mg.addColorStop(0.5,'rgba(254,243,148,0.06)');mg.addColorStop(1,'transparent');ctx.fillStyle=mg;ctx.fillRect(0,0,W,H);
  ctx.beginPath();ctx.arc(mx,my,27,0,Math.PI*2);ctx.fillStyle='rgba(255,247,160,0.9)';ctx.fill();
  ctx.beginPath();ctx.arc(mx+12,my-5,22,0,Math.PI*2);ctx.fillStyle='rgba(2,8,3,0.92)';ctx.fill();
  ctx.beginPath();ctx.moveTo(0,H*0.73);
  for(let i=0;i<=14;i++){const hx=(i/14)*W,hy=H*0.73-Math.sin(i*0.85+1.1)*H*0.1-Math.sin(i*0.38+0.5)*H*0.046;ctx.lineTo(hx,hy);}
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle='#030b04';ctx.fill();
  const grd=ctx.createLinearGradient(0,H*0.75,0,H);grd.addColorStop(0,'#071308');grd.addColorStop(1,'#020704');ctx.fillStyle=grd;ctx.fillRect(0,H*0.75,W,H*0.25);
  for(let m=0;m<3;m++){const bx=((tick*0.22+m*380)%(W+700))-350,by=H*0.71+m*14;const mist=ctx.createRadialGradient(bx,by,0,bx,by,240);mist.addColorStop(0,'rgba(74,222,128,0.04)');mist.addColorStop(1,'transparent');ctx.fillStyle=mist;ctx.fillRect(0,0,W,H);}
  clouds.forEach(cl=>{cl.x+=cl.spd;if(cl.x>W+cl.w)cl.x=-cl.w;ctx.save();ctx.globalAlpha=cl.alpha;ctx.fillStyle='#8ecf8e';ctx.beginPath();ctx.ellipse(cl.x,cl.y,cl.w*0.5,cl.h*0.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cl.x+cl.w*0.26,cl.y-cl.h*0.18,cl.w*0.35,cl.h*0.38,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cl.x-cl.w*0.24,cl.y-cl.h*0.12,cl.w*0.3,cl.h*0.32,0,0,Math.PI*2);ctx.fill();ctx.restore();});
  birds.forEach(b=>{b.x+=b.spd;if(b.x>W+20)b.x=-20;b.fp+=0.09;const fl=Math.sin(b.fp)*b.size*0.55;ctx.save();ctx.globalAlpha=0.32;ctx.strokeStyle='#86efac';ctx.lineWidth=1.4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(b.x-b.size,b.y+fl);ctx.quadraticCurveTo(b.x,b.y,b.x+b.size,b.y+fl);ctx.stroke();ctx.restore();});
  blades.forEach(b=>{
    const wind=Math.sin(tick*b.spd*0.033+b.phase);
    const totalSway=wind*b.sway;
    const pts=[];
    for(let s=0;s<=b.segs;s++){
      const t=s/b.segs,sw=totalSway*t*t,lean=t*t*b.sway*0.12;
      pts.push({x:b.x+sw+lean,y:b.y-t*b.h,w:b.bw*Math.pow(1-t,1.5)});
    }
    ctx.beginPath();
    ctx.moveTo(pts[0].x-pts[0].w*0.5,pts[0].y);
    for(let s=1;s<pts.length;s++)ctx.lineTo(pts[s].x-pts[s].w*0.5,pts[s].y);
    ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y-1);
    for(let s=pts.length-1;s>=0;s--)ctx.lineTo(pts[s].x+pts[s].w*0.5,pts[s].y);
    ctx.closePath();
    const g2=ctx.createLinearGradient(b.x,b.y,b.x+totalSway*0.6,b.y-b.h);
    g2.addColorStop(0,`hsl(${b.hue},${b.sat}%,${b.lit*0.55}%)`);
    g2.addColorStop(0.45,`hsl(${b.hue},${b.sat}%,${b.lit}%)`);
    g2.addColorStop(1,`hsl(${b.hue+10},${Math.min(b.sat+15,100)}%,${b.lit+16}%)`);
    ctx.fillStyle=g2;ctx.fill();
    if(b.layer===2&&b.bw>3.2){ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.strokeStyle=`hsla(${b.hue+12},${b.sat}%,${b.lit+22}%,0.28)`;ctx.lineWidth=0.7;ctx.stroke();}
  });
  fireflies.forEach(p=>{
    p.x+=p.vx+Math.sin(tick*0.018+p.phase)*0.28;p.y+=p.vy;p.life++;
    if(p.life>p.maxLife||p.y<H*0.12){p.x=rnd(0,W);p.y=rnd(H*0.5,H*0.78);p.vx=rnd(-0.25,0.25);p.vy=rnd(-0.35,-0.05);p.life=0;p.maxLife=rnd(100,280);}
    const fade=Math.sin((p.life/p.maxLife)*Math.PI),pulse=0.5+0.5*Math.sin(tick*0.075+p.phase);
    ctx.save();ctx.globalAlpha=fade*pulse*0.88;
    const fg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*4);fg.addColorStop(0,`hsl(${p.hue},90%,76%)`);fg.addColorStop(1,'transparent');ctx.fillStyle=fg;ctx.beginPath();ctx.arc(p.x,p.y,p.size*4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=fade*pulse;ctx.fillStyle=`hsl(${p.hue},98%,88%)`;ctx.beginPath();ctx.arc(p.x,p.y,p.size*0.65,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  requestAnimationFrame(frame);
}
window.addEventListener('resize',resize);
resize();frame();
</script>
